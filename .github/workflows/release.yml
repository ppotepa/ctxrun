name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # required for npm provenance

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
        node-version: '20'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install fpm for .deb building
        run: sudo apt-get update && sudo apt-get install -y ruby ruby-dev build-essential && sudo gem install fpm -N

      - name: Run tests
        run: npm run test:unit

      - name: Build release artifacts
        run: bash scripts/build-release.sh

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
        files: dist/release/*
        body: |
          ## Changes

          See [commits](https://github.com/ppotepa/ctxrun/commits/${{ github.ref_name }}) for full changelog.

          ## Install

          ```bash
          # One-liner
          curl -fsSL https://raw.githubusercontent.com/ppotepa/ctxrun/main/install.sh | bash

          # npm
          npm install -g @ppotepa/ctxrun

          # Debian/Ubuntu
          sudo dpkg -i ctxrun_*.deb

          # Tarball
          tar xzf ctxrun-v*.tar.gz
          export PATH=$PATH:$(pwd)/ctxrun/dist/cli
          ```

          ## Verify

          ```bash
          ctxrun --version
          ctxrun doctor
          ctxrun plugins list
          ```
        draft: false
